global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "backend-api"
    metrics_path: "/api/metrics"
    static_configs:
      - targets: ["backend-api:5000"]

  - job_name: "frontend-web"
    metrics_path: "/api/metrics"
    static_configs:
      - targets: ["frontend-web:3000"]
